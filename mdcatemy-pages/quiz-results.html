<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Results · MDCATEMY</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "warrior-black":  "#181A18",
            "dark-charcoal":  "#222422",
            "warrior-gray":   "#2A2C2A",
            "warrior-border": "#2E302E",
            "warrior-text":   "#A8ACA8",
            "mdcat-yellow":      "#FFC600",
            "mdcat-yellow-dark": "#E6B200",
          },
          fontFamily: {
            poppins: ["Poppins", "sans-serif"],
            inter:   ["Inter",   "sans-serif"],
          },
        },
      },
    };
  </script>

  <style>
    html, body { height: 100%; }
    body {
      font-family: "Inter", sans-serif;
      background-color: #181A18;
      color: #FFFFFF;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #181A18; }
    ::-webkit-scrollbar-thumb { background: #FFC600; border-radius: 3px; }
    ::selection { background: rgba(255,198,0,0.3); color: #fff; }
  </style>
</head>
<body class="bg-warrior-black">

  <div class="flex h-screen bg-warrior-black overflow-hidden">

    <!-- ════════════════════════════════════════════════════════════
         DESKTOP SIDEBAR — Quiz Builder is ACTIVE
    ════════════════════════════════════════════════════════════ -->
    <aside class="hidden lg:flex flex-col bg-warrior-black border-r border-warrior-border overflow-hidden relative z-20 flex-shrink-0" style="width: 240px;">

      <div class="flex items-center gap-3 h-[60px] px-4 border-b border-warrior-border flex-shrink-0">
        <div class="bg-mdcat-yellow flex items-center justify-center flex-shrink-0"
             style="width:28px; height:32px; clip-path: polygon(50% 0%, 100% 15%, 100% 75%, 50% 100%, 0% 75%, 0% 15%);">
          <span class="font-poppins font-black text-warrior-black leading-none" style="font-size:10px;">M</span>
        </div>
        <span class="font-poppins font-black text-[15px] tracking-tight whitespace-nowrap">
          <span class="text-mdcat-yellow">MDCAT</span><span class="text-white">EMY</span>
        </span>
      </div>

      <nav class="flex-1 py-3 overflow-y-auto overflow-x-hidden">
        <div class="space-y-0.5 px-2">

          <!-- My Camp -->
          <a href="#" class="relative flex items-center rounded-lg gap-3 px-3 py-2.5 text-warrior-text hover:bg-warrior-gray/40 hover:text-white transition-all duration-200">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
              <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
              <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
            </svg>
            <span class="font-inter font-semibold text-[13px] truncate">My Camp</span>
          </a>

          <!-- Quiz Builder (ACTIVE) -->
          <a href="#" class="relative flex items-center rounded-lg gap-3 px-3 py-2.5 bg-mdcat-yellow/10 text-mdcat-yellow transition-all duration-200">
            <div class="absolute left-0 top-1/2 -translate-y-1/2 w-[3px] h-5 bg-mdcat-yellow rounded-full"></div>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
              <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
            </svg>
            <span class="font-inter font-semibold text-[13px] truncate">Quiz Builder</span>
          </a>

          <!-- Test Series -->
          <a href="test-series.html" class="relative flex items-center rounded-lg gap-3 px-3 py-2.5 text-warrior-text hover:bg-warrior-gray/40 hover:text-white transition-all duration-200">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
              <path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.91a1 1 0 0 0 0-1.83Z"/>
              <path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"/>
              <path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"/>
            </svg>
            <span class="font-inter font-semibold text-[13px] truncate">Test Series</span>
          </a>

          <!-- My Copy -->
          <a href="#" class="relative flex items-center rounded-lg gap-3 px-3 py-2.5 text-warrior-text hover:bg-warrior-gray/40 hover:text-white transition-all duration-200">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
              <rect x="2" y="3" width="20" height="5" rx="1"/>
              <path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/>
              <path d="M10 12h4"/>
            </svg>
            <span class="font-inter font-semibold text-[13px] truncate">My Copy</span>
          </a>

          <!-- Analytics -->
          <a href="#" class="relative flex items-center rounded-lg gap-3 px-3 py-2.5 text-warrior-text hover:bg-warrior-gray/40 hover:text-white transition-all duration-200">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
              <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            <span class="font-inter font-semibold text-[13px] truncate">Analytics</span>
          </a>
        </div>
      </nav>

      <div class="border-t border-warrior-border py-2 space-y-0.5 px-2">
        <a href="#" class="relative flex items-center rounded-lg gap-3 px-3 py-2.5 text-warrior-text hover:bg-warrior-gray/40 hover:text-white transition-all duration-200">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span class="font-inter font-semibold text-[13px]">Settings</span>
        </a>
        <button class="w-full flex items-center rounded-lg gap-3 px-3 py-2.5 text-warrior-text hover:bg-warrior-gray/40 hover:text-white transition-all duration-200">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 3v18"/><path d="m16 15-3-3 3-3"/>
          </svg>
          <span class="font-inter font-semibold text-[13px]">Collapse</span>
        </button>
      </div>

      <div class="border-t border-warrior-border py-3 flex items-center gap-3 px-3">
        <div class="rounded-full bg-mdcat-yellow/15 border border-mdcat-yellow/30 flex items-center justify-center flex-shrink-0" style="width:32px; height:32px;">
          <span class="font-poppins font-black text-mdcat-yellow" style="font-size:11px;">HK</span>
        </div>
        <div class="min-w-0">
          <p class="font-inter font-bold text-[12px] text-white leading-tight">Hayan Khan</p>
          <p class="font-inter text-[10px] text-warrior-text uppercase tracking-[0.1em]">Warrior</p>
        </div>
      </div>
    </aside>

    <!-- ════════════════════════════════════════════════════════════
         MAIN AREA
    ════════════════════════════════════════════════════════════ -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

      <!-- Top bar — Quiz Builder -->
      <header class="h-[60px] bg-dark-charcoal border-b border-warrior-border flex items-center justify-between px-4 lg:px-6 flex-shrink-0 z-10">
        <div class="flex items-center gap-3">
          <button class="lg:hidden text-warrior-text hover:text-white transition-colors p-1">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="4" y1="6"  x2="20" y2="6"/>
              <line x1="4" y1="12" x2="20" y2="12"/>
              <line x1="4" y1="18" x2="20" y2="18"/>
            </svg>
          </button>
          <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 bg-mdcat-yellow/10 border border-mdcat-yellow/25 rounded-lg flex items-center justify-center">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-mdcat-yellow">
                <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
              </svg>
            </div>
            <div>
              <h1 class="font-poppins font-black text-white text-[15px] leading-tight">Quiz Builder</h1>
              <p class="text-warrior-text text-[10px] font-inter hidden lg:block leading-tight mt-0.5">
                Pick subjects, chapters and settings — then generate.
              </p>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-1.5 lg:gap-2">
          <button class="w-9 h-9 flex items-center justify-center text-warrior-text hover:text-white hover:bg-warrior-gray/50 rounded-lg transition-all">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
          </button>
          <button class="relative w-9 h-9 flex items-center justify-center text-warrior-text hover:text-white hover:bg-warrior-gray/50 rounded-lg transition-all">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
              <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
            </svg>
            <span class="absolute top-[7px] right-[7px] w-1.5 h-1.5 bg-mdcat-yellow rounded-full"></span>
          </button>
          <div class="rounded-full bg-mdcat-yellow/15 border border-mdcat-yellow/30 flex items-center justify-center flex-shrink-0" style="width:32px; height:32px;">
            <span class="font-poppins font-black text-mdcat-yellow" style="font-size:11px;">HK</span>
          </div>
        </div>
      </header>

      <!-- Page content -->
      <main class="flex-1 overflow-hidden pb-[58px] lg:pb-0">
        <div class="h-full overflow-y-auto">
          <div class="px-4 lg:px-8 py-6 max-w-3xl mx-auto space-y-6">

            <!-- ─── Score Hero ─── -->
            <div class="bg-dark-charcoal border border-warrior-border rounded-2xl p-6 lg:p-8 text-center">

              <!-- SVG ring (r=40, c≈251.33; pct=0 → "0/20" red) -->
              <div class="relative w-32 h-32 mx-auto mb-5">
                <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
                  <!-- Track -->
                  <circle cx="50" cy="50" r="40" fill="none" stroke="#2A2C2A" stroke-width="8"/>
                  <!-- Progress (0% → tiny dot near top via small dash) -->
                  <circle cx="50" cy="50" r="40" fill="none"
                          stroke="#D9534F" stroke-width="8" stroke-linecap="round"
                          stroke-dasharray="2 251.33"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                  <span class="font-poppins font-black text-white text-3xl leading-none">0</span>
                  <span class="text-warrior-text text-xs font-inter">/ 20</span>
                </div>
              </div>

              <!-- BATTLE STATIONS rank pill -->
              <div class="inline-block px-4 py-1.5 rounded-full border-2 border-red-400 bg-red-400/10 text-red-400 text-sm font-inter font-black uppercase tracking-[0.1em] mb-3">
                Battle Stations
              </div>

              <p class="font-poppins font-black text-white text-4xl mb-1">0%</p>
              <p class="text-warrior-text font-inter text-sm">Mixed Subjects</p>
            </div>

            <!-- ─── 4-stat strip ─── -->
            <div class="grid grid-cols-4 gap-2.5">
              <div class="rounded-xl border border-emerald-500/20 bg-emerald-500/5 py-4 text-center">
                <p class="font-poppins font-black text-emerald-400 text-2xl leading-none">0</p>
                <p class="text-warrior-text text-[10px] font-inter mt-1.5 uppercase tracking-[0.08em]">Correct</p>
              </div>
              <div class="rounded-xl border border-red-500/20 bg-red-500/5 py-4 text-center">
                <p class="font-poppins font-black text-red-400 text-2xl leading-none">0</p>
                <p class="text-warrior-text text-[10px] font-inter mt-1.5 uppercase tracking-[0.08em]">Wrong</p>
              </div>
              <div class="rounded-xl border border-warrior-border py-4 text-center">
                <p class="font-poppins font-black text-warrior-text text-2xl leading-none">20</p>
                <p class="text-warrior-text text-[10px] font-inter mt-1.5 uppercase tracking-[0.08em]">Skipped</p>
              </div>
              <div class="rounded-xl border border-mdcat-yellow/20 bg-mdcat-yellow/5 py-4 text-center">
                <p class="font-poppins font-black text-mdcat-yellow text-2xl leading-none">0</p>
                <p class="text-warrior-text text-[10px] font-inter mt-1.5 uppercase tracking-[0.08em]">Saved</p>
              </div>
            </div>

            <!-- ─── Action buttons ─── -->
            <div class="grid grid-cols-2 gap-3">
              <!-- New Quiz (ghost) -->
              <button class="flex items-center justify-center gap-2 py-3.5 px-4 bg-warrior-gray/30 border border-warrior-border rounded-xl text-white text-[13px] font-inter font-black uppercase tracking-[0.08em] hover:border-mdcat-yellow/40 transition-all">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                  <path d="M21 3v5h-5"/>
                  <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                  <path d="M3 21v-5h5"/>
                </svg>
                New Quiz
              </button>

              <!-- Review Answers (yellow primary) -->
              <button class="flex items-center justify-center gap-2 py-3.5 px-4 bg-mdcat-yellow text-warrior-black rounded-xl text-[13px] font-inter font-black uppercase tracking-[0.08em] shadow-lg shadow-mdcat-yellow/15 hover:scale-[1.01] transition-all">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                Review Answers
              </button>
            </div>

          </div>
        </div>
      </main>

      <!-- ════════════════════════════════════════════════════════════
           MOBILE BOTTOM TAB BAR — Quiz is ACTIVE
      ════════════════════════════════════════════════════════════ -->
      <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-dark-charcoal border-t border-warrior-border z-30">
        <div class="flex items-stretch" style="height:58px;">

          <!-- Home -->
          <a href="#" class="flex-1 flex flex-col items-center justify-center gap-0.5 relative pt-1">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-warrior-text">
              <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
              <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
            </svg>
            <span class="text-[9px] font-inter font-bold uppercase tracking-[0.05em] text-warrior-text">Home</span>
          </a>

          <!-- Quiz (ACTIVE) -->
          <a href="#" class="flex-1 flex flex-col items-center justify-center gap-0.5 relative pt-1">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-6 h-0.5 bg-mdcat-yellow rounded-full"></div>
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-mdcat-yellow">
              <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
            </svg>
            <span class="text-[9px] font-inter font-bold uppercase tracking-[0.05em] text-mdcat-yellow">Quiz</span>
          </a>

          <!-- Tests -->
          <a href="test-series.html" class="flex-1 flex flex-col items-center justify-center gap-0.5 relative pt-1">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-warrior-text">
              <path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.91a1 1 0 0 0 0-1.83Z"/>
              <path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"/>
              <path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"/>
            </svg>
            <span class="text-[9px] font-inter font-bold uppercase tracking-[0.05em] text-warrior-text">Tests</span>
          </a>

          <!-- Copy -->
          <a href="#" class="flex-1 flex flex-col items-center justify-center gap-0.5 relative pt-1">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-warrior-text">
              <rect x="2" y="3" width="20" height="5" rx="1"/>
              <path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/>
              <path d="M10 12h4"/>
            </svg>
            <span class="text-[9px] font-inter font-bold uppercase tracking-[0.05em] text-warrior-text">Copy</span>
          </a>

          <!-- Analytics -->
          <a href="#" class="flex-1 flex flex-col items-center justify-center gap-0.5 relative pt-1">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-warrior-text">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6"  y1="20" x2="6"  y2="14"/>
            </svg>
            <span class="text-[9px] font-inter font-bold uppercase tracking-[0.05em] text-warrior-text">Analytics</span>
          </a>

        </div>
      </div>

    </div>
  </div>

</body>
