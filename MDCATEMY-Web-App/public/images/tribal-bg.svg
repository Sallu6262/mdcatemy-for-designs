<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <pattern id="tribal" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Angular tribal diamond -->
      <polygon points="100,10 190,100 100,190 10,100" fill="none" stroke="#FFC600" stroke-width="0.5" opacity="0.4"/>
      <polygon points="100,30 170,100 100,170 30,100" fill="none" stroke="#FFC600" stroke-width="0.3" opacity="0.3"/>
      <!-- Corner cuts -->
      <line x1="0" y1="0" x2="40" y2="0" stroke="#FFC600" stroke-width="0.5" opacity="0.25"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#FFC600" stroke-width="0.5" opacity="0.25"/>
      <line x1="200" y1="0" x2="160" y2="0" stroke="#FFC600" stroke-width="0.5" opacity="0.25"/>
      <line x1="200" y1="0" x2="200" y2="40" stroke="#FFC600" stroke-width="0.5" opacity="0.25"/>
      <line x1="0" y1="200" x2="40" y2="200" stroke="#FFC600" stroke-width="0.5" opacity="0.25"/>
      <line x1="0" y1="200" x2="0" y2="160" stroke="#FFC600" stroke-width="0.5" opacity="0.25"/>
      <line x1="200" y1="200" x2="160" y2="200" stroke="#FFC600" stroke-width="0.5" opacity="0.25"/>
      <line x1="200" y1="200" x2="200" y2="160" stroke="#FFC600" stroke-width="0.5" opacity="0.25"/>
      <!-- Center dot -->
      <circle cx="100" cy="100" r="2" fill="#FFC600" opacity="0.2"/>
      <!-- Diagonal slashes -->
      <line x1="60" y1="60" x2="80" y2="40" stroke="#FFC600" stroke-width="0.4" opacity="0.2"/>
      <line x1="120" y1="160" x2="140" y2="140" stroke="#FFC600" stroke-width="0.4" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#tribal)"/>
</svg>
